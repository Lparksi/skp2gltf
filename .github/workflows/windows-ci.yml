name: Windows CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skp2gltf-windows-release
          if-no-files-found: warn
          path: |
            build/Release/skp2gltf.exe
            build/Release/SketchUpAPI.dll
            build/Release/SketchUpCommonPreferences.dll

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/Release/skp2gltf.exe
            build/Release/SketchUpAPI.dll
            build/Release/SketchUpCommonPreferences.dll
