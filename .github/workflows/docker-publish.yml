name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-windows-binary:
    name: Build Windows Binary
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake)
        run: cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Stage Docker Binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path docker-bin -Force | Out-Null
          Copy-Item build/Release/skp2gltf.exe docker-bin/
          Copy-Item build/Release/SketchUpAPI.dll docker-bin/
          Copy-Item build/Release/SketchUpCommonPreferences.dll docker-bin/

      - name: Upload Docker Binaries
        uses: actions/upload-artifact@v4
        with:
          name: docker-bin
          if-no-files-found: error
          path: docker-bin/*

  build-and-push-images:
    name: Build and Push Images
    needs: build-windows-binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image_suffix: ""
          - dockerfile: Dockerfile.alpine
            image_suffix: "-alpine"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker Binaries
        uses: actions/download-artifact@v4
        with:
          name: docker-bin
          path: docker-bin

      - name: Verify Docker Context
        run: ls -lah docker-bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
